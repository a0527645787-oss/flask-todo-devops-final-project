{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="panel narrow-panel">
    <h1>Admin login</h1>
    <p>Enter the admin password to view booking records.</p>

    {% if error %}
        <p class="error-message">{{ error }}</p>
    {% endif %}

    <form class="admin-form" method="post" action="{{ url_for('admin_login') }}">
        <label for="password">Password</label>
        <div class="password-field">
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button
                class="password-toggle"
                type="button"
                aria-label="Show password"
                data-show-label="Show password"
                data-hide-label="Hide password"
            >
                Show
            </button>
        </div>
        <button class="button" type="submit">Login</button>
    </form>
</section>

<script>
    const passwordInput = document.getElementById("password");
    const passwordToggle = document.querySelector(".password-toggle");

    passwordToggle.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        passwordToggle.textContent = isHidden ? "Hide" : "Show";
        passwordToggle.setAttribute(
            "aria-label",
            isHidden ? passwordToggle.dataset.hideLabel : passwordToggle.dataset.showLabel
        );
    });
</script>
{% endblock %}
